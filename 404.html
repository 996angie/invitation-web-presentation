<!doctype html>
<html lang="sr-Latn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Stranica nije pronađena | Pozivnica</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f8efff, #fff0f5 55%, #eef5ff);
      color: #24123b;
    }
    main {
      width: min(620px, 100%);
      text-align: center;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(96,55,138,.12);
      border-radius: 28px;
      padding: 48px 28px;
      box-shadow: 0 18px 60px rgba(62,31,93,.12);
    }
    .code { font-size: clamp(72px, 18vw, 150px); line-height: .9; font-weight: 800; color: #7442bd; }
    h1 { font-size: clamp(28px, 5vw, 44px); margin: 20px 0 12px; }
    p { font-size: 18px; line-height: 1.6; color: #64546e; margin: 0 auto 28px; max-width: 470px; }
    a {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 999px;
      background: #6a38b6;
      color: white;
      text-decoration: none;
      font-weight: 700;
    }
    a:focus-visible { outline: 3px solid #24123b; outline-offset: 4px; }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Ova stranica ne postoji</h1>
    <p>Link je možda istekao ili je adresa pogrešno uneta. Vrati se na početnu stranicu i pogledaj digitalne pozivnice.</p>
    <a href="/">Nazad na početnu</a>
  </main>
</body>
</html>
